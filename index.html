    function App() {
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('edu_user');

      const [toasts, setToasts] = useState([]);
      const [deviceMode, setDeviceMode] = useState('responsive'); // 'responsive' or 'mobile-emulator'

      useEffect(() => {
        const handleHashChange = () => {
          setCurrentPath(window.location.hash ? window.location.hash.replace('#', '') : '/');
        };
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const navigateTo = (path) => {
        window.location.hash = path;
        setCurrentPath(path);
      };

      const login = (role, id) => {
        let userData = null;
        if (role === 'student') userData = { id, role, name: 'Rahul Patil', batch: 'Batch B', parentId: 'PAR-001' };
        if (role === 'teacher') userData = { id, role, name: 'Priya Kulkarni Ma\'am', subject: 'Mathematics' };
        if (role === 'management') userData = { id, role, name: 'EduConnect Admin Panel' };
        if (role === 'parent') userData = { id, role, name: 'Mr. Deepak Patil', childName: 'Rahul Patil', childId: 'STU-001' };

        if (userData) {
          setUser(userData);
          localStorage.setItem('edu_user', JSON.stringify(userData));
          addToast('Login Successful!', 'success');
          
          if (role === 'student') navigateTo('/student/dashboard');
          if (role === 'teacher') navigateTo('/teacher/dashboard');
          if (role === 'management') navigateTo('/management/dashboard');
          if (role === 'parent') navigateTo('/parent/dashboard');
        }

        setUser(null);
        localStorage.removeItem('edu_user');
        addToast('Logged out successfully', 'info');
        navigateTo('/');

        const id = Date.now();
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 3000);

    function Router() {
      const { currentPath } = useContext(NavigationContext);

      if (currentPath.startsWith('/teacher') && (!user || user.role !== 'teacher')) return <LoginPage forceRole="teacher" />;
      if (currentPath.startsWith('/management') && (!user || user.role !== 'management')) return <LoginPage forceRole="management" />;
      if (currentPath.startsWith('/parent') && (!user || user.role !== 'parent')) return <LoginPage forceRole="parent" />;

      switch (currentPath) {
        case '/': return <LandingPage />;
        case '/login': return <LoginPage />;
        case '/student/dashboard': return <StudentDashboard tab="home" />;
        case '/student/lectures': return <StudentDashboard tab="lectures" />;
        case '/student/notes': return <StudentDashboard tab="notes" />;
        case '/student/doubts': return <StudentDashboard tab="doubts" />;

        case '/teacher/dashboard': return <TeacherDashboard tab="home" />;

        case '/teacher/attendance': return <TeacherDashboard tab="attendance" />;
        case '/teacher/schedule': return <TeacherDashboard tab="schedule" />;

        case '/marketplace/tuition': return <MarketplaceLayout view="tuition" />;

    function LoginPage({ forceRole }) {
      const { login } = useContext(AuthContext);
      const { addToast } = useContext(ToastContext);

      const [selectedRole, setSelectedRole] = useState(forceRole || 'student');
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);

      const fillCredentials = (role) => {
        setSelectedRole(role);
        if (role === 'student') { setUsername('STU-001'); setPassword('student123'); }
        if (role === 'teacher') { setUsername('TCH-001'); setPassword('teacher123'); }
        if (role === 'management') { setUsername('MGT-001'); setPassword('admin123'); }
        if (role === 'parent') { setUsername('PAR-001'); setPassword('parent123'); }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!username || !password) {
          addToast('कृपया युनिक आयडी आणि पासवर्ड टाका!', 'error');
          return;
        }

        setIsSubmitting(true);
        setTimeout(() => {
          setIsSubmitting(false);
          let isValid = false;

          if (selectedRole === 'student' && username === 'STU-001' && password === 'student123') isValid = true;
          if (selectedRole === 'teacher' && username === 'TCH-001' && password === 'teacher123') isValid = true;
          if (selectedRole === 'management' && username === 'MGT-001' && password === 'admin123') isValid = true;
          if (selectedRole === 'parent' && username === 'PAR-001' && password === 'parent123') isValid = true;

          if (isValid) {
            login(selectedRole, username);
          } else {
            addToast('चुकीचा आयडी किंवा पासवर्ड!', 'error');
          }
        }, 800);
      };

                  <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-200">
                    <p className="text-emerald-800 font-bold">✔ AI वेळापत्रक तयार आहे!</p>
                  </div>
                ) : (
                  <button onClick={generateSchedule} className="w-full bg-indigo-600 text-white font-bold py-2 rounded-xl">🪄 Auto-Generate weekly schedule</button>
                )}
              </div>
            )}

            {}
            {activeTab === 'fees' && (
              <div className="bg-white p-4 rounded-xl border border-slate-100 text-xs space-y-3">
                <h3 className="font-bold">फी व्यवस्थापन विभाग</h3>
                <div className="divide-y divide-slate-100">
                  <div className="py-2.5 flex justify-between items-center">
                    <div>
                      <p className="font-bold">राहुल पाटील</p>
                      <span className="text-[9px] text-rose-500 font-bold">थकीत: ₹१२,०००</span>
                    </div>
                    <button onClick={() => addToast('फी स्मरणपत्र SMS पाठवला!', 'success')} className="bg-slate-900 text-white px-3 py-1 rounded-lg">Remind</button>
                  </div>
                </div>
              </div>
            )}

            {}
            {activeTab === 'settings' && (
              <div className="bg-white p-4 rounded-xl border border-slate-100 text-xs space-y-3">
                <h3 className="font-bold">क्लास प्रोफाइल</h3>
                <div>
                  <label className="block text-slate-400">Class Name</label>
                  <input type="text" defaultValue="EduConnect Coaching Classes" className="w-full border border-slate-200 p-2 rounded-xl focus:outline-none" />
                </div>
                <button onClick={() => addToast('सेटिंग्ज सेव्ह झाल्या!', 'success')} className="w-full bg-indigo-600 text-white py-2 rounded-xl font-bold">Save Changes</button>
              </div>
            )}
          </div>

          <BottomNavigation activeTab={activeTab} tabs={managementTabs} onTabChange={setActiveTab} />
        </div>
      );
    }

    function ParentDashboard({ tab }) {
      const { navigateTo } = useContext(NavigationContext);
      const { addToast } = useContext(ToastContext);

      const [activeTab, setActiveTab] = useState(tab || 'home');
      const [paymentModal, setPaymentModal] = useState(false);

      const parentTabs = [
        { id: 'home', label: 'Home', icon: '👪' },
        { id: 'progress', label: 'Progress', icon: '📊' },
        { id: 'attendance', label: 'Roll', icon: '📅' },
        { id: 'fees', label: 'Fees', icon: '💸' },
      ];

      return (
        <div className="flex-1 flex flex-col justify-between h-full bg-slate-50">
          <Header title="पालक पोर्टल" />

          <div className="flex-1 p-4 overflow-y-auto w-full max-w-md mx-auto">
            {activeTab === 'home' && (
              <div className="space-y-4">
                <h2 className="text-base font-bold">नमस्ते, दीपक पाटील! 🙏</h2>
                <div className="bg-indigo-950 text-white p-4 rounded-xl">
                  <span className="text-[9px] bg-indigo-800 px-2 py-0.5 rounded font-bold">विद्यार्थी ट्रॅकिंग कार्ड</span>
                  <h3 className="font-bold mt-2">राहुल पाटील</h3>
                  <p className="text-[10px] text-indigo-300 mt-1">हजेरी: 87% • परीक्षा सरासरी: 88%</p>
                </div>
              </div>
            )}

            {}
            {activeTab === 'progress' && (
              <div className="bg-white p-4 rounded-xl border border-slate-100 text-xs space-y-3">
                <h3 className="font-bold text-center">राहुलची प्रगती</h3>
                <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 text-amber-900 leading-relaxed text-[10px]">
                  <strong>🪄 AI Insight:</strong> राहुलचा Physics मधील अभ्यास खूप चांगला आहे, परंतु Algebra मध्ये थोडे अधिक सराव करण्याची गरज आहे.
                </div>
              </div>
            )}

            {}
            {activeTab === 'attendance' && (
              <div className="bg-white p-4 rounded-xl border border-slate-100 text-xs space-y-3">
                <h3 className="font-bold text-center">हजेरी रेकॉर्ड (Current Month)</h3>
                <div className="grid grid-cols-7 gap-1.5 text-center text-[10px]">
                  {Array.from({ length: 21 }).map((_, i) => (
                    <div key={i} className="p-2 rounded bg-emerald-100 border border-emerald-200 font-bold text-emerald-800">
                      {i + 1}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {}
            {activeTab === 'fees' && (
              <div className="bg-white p-4 rounded-xl border border-slate-100 text-xs space-y-3">
                <h3 className="font-bold">फी पेमेंट विभाग</h3>
                <div className="p-3 bg-slate-50 border rounded-xl flex justify-between items-center">
                  <div>
                    <p className="font-bold text-slate-800">Coaching Term 2 Fees</p>
                    <span className="text-[9px] text-slate-400">Due: 15-Jul-2026</span>
                  </div>
                  <p className="font-black text-indigo-900">₹१२,०००</p>
                </div>
                <button onClick={() => setPaymentModal(true)} className="w-full bg-indigo-600 text-white font-bold py-2 rounded-xl">Pay Online (UPI / Card)</button>
              </div>
            )}
          </div>

          {paymentModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-xs flex items-center justify-center p-4 z-50">
              <div className="bg-white p-5 rounded-2xl w-full max-w-xs text-xs text-center space-y-4">
                <h3 className="font-bold text-sm">UPI Merchant Gateway</h3>
                <p className="text-lg font-black text-indigo-900">₹१२,०००</p>
                <button 
                  onClick={() => { setPaymentModal(false); addToast('पेमेंट यशस्वी झाले!', 'success'); }} 
                  className="bg-indigo-600 text-white font-bold py-1.5 px-4 rounded-xl w-full"
                >
                  Pay via PhonePe / GooglePay
                </button>
              </div>
            </div>
          )}

          <BottomNavigation activeTab={activeTab} tabs={parentTabs} onTabChange={setActiveTab} />
        </div>
      );
    }

    function MarketplaceLayout({ view }) {
      const { navigateTo } = useContext(NavigationContext);
      const { addToast } = useContext(ToastContext);

      const [currentView, setCurrentView] = useState(view || 'tuition');
      const [selectedTeacher, setSelectedTeacher] = useState(null);

      return (
        <div className="flex-1 flex flex-col justify-between h-full bg-slate-50">
          <Header title="EduConnect Marketplace" />
          
          <div className="bg-slate-900 border-t border-slate-800 text-white flex text-[10px] shrink-0">
            <button onClick={() => setCurrentView('tuition')} className={`flex-1 py-2 text-center border-b-2 font-bold ${currentView === 'tuition' ? 'border-indigo-500 text-indigo-400' : 'border-transparent text-slate-400'}`}>📍 Find Tutors</button>
            <button onClick={() => setCurrentView('chapters')} className={`flex-1 py-2 text-center border-b-2 font-bold ${currentView === 'chapters' ? 'border-indigo-500 text-indigo-400' : 'border-transparent text-slate-400'}`}>📖 Chapter Micro-Store</button>
          </div>

          <div className="flex-1 p-4 overflow-y-auto w-full max-w-md mx-auto">
            {currentView === 'tuition' && (
              <div className="space-y-3">
                {TEACHERS.map(t => (
                  <div key={t.id} className="bg-white p-3 rounded-xl border border-slate-100 flex justify-between items-center">
                    <div>
                      <h4 className="font-bold text-xs">{t.name}</h4>
                      <p className="text-[9px] text-slate-400">{t.subject} • {t.exp}</p>
                    </div>
                    <button onClick={() => setSelectedTeacher(t)} className="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-lg">Trial Class</button>
                  </div>
                ))}
              </div>
            )}

            {currentView === 'chapters' && (
              <div className="space-y-3">
                {MARKET_CHAPTERS.map(c => (
                  <div key={c.id} className="bg-white p-3 rounded-xl border border-slate-100 flex justify-between items-center">
                    <div>
                      <h4 className="font-bold text-xs">{c.title}</h4>
                      <p className="text-[9px] text-slate-400">किंमत: ₹{c.price}</p>
                    </div>
                    <button onClick={() => addToast('चॅप्टर यशस्वीरित्या खरेदी केला!', 'success')} className="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-lg">Buy Now</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {selectedTeacher && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-xs flex items-center justify-center p-4 z-50">
              <div className="bg-white p-5 rounded-2xl w-full max-w-xs text-xs text-center space-y-3">
                <h3 className="font-bold">{selectedTeacher.name} सोबत ट्रायल बुक करा.</h3>
                <button onClick={() => { setSelectedTeacher(null); addToast('ट्रायल क्लास बुक झाला!', 'success'); }} className="bg-indigo-600 text-white font-bold py-1.5 px-4 rounded-xl w-full">Confirm demo session</button>
              </div>
            </div>
          )}

          <div className="p-3 bg-slate-900 text-center shrink-0">
            <button onClick={() => navigateTo('/')} className="text-white text-[10px] font-bold">← Exit Marketplace</button>
          </div>
        </div>
      );
    }

    function AdmissionChatbot() {
      const [open, setOpen] = useState(false);
      const [chats, setChats] = useState([{ sender: 'bot', text: 'नमस्कार! मी तुमचा ऑनलाईन सहाय्यक आहे. कशाबद्दल माहिती हवी आहे?' }]);

      const query = (opt) => {
        let answer = '';
        if (opt === 'timing') answer = 'आपले वर्ग रोज दुपारी ३:३० ते सायंकाळी ७:०० पर्यंत चालतात.';
        if (opt === 'fees') answer = 'आपल्याकडे प्रतिमहिना ₹१,५०० आणि वार्षिक पॅकेज ₹१५,००० उपलब्ध आहेत.';
        setChats(prev => [...prev, { sender: 'user', text: opt }, { sender: 'bot', text: answer }]);
      };

      return (
        <div className="fixed bottom-6 right-6 z-50 text-xs">
          {open ? (
            <div className="w-64 h-80 bg-white rounded-2xl border shadow-2xl flex flex-col overflow-hidden">
              <div className="bg-slate-950 text-white p-2.5 font-bold flex justify-between">
                <span>EduConnect Bot</span>
                <button onClick={() => setOpen(false)}>✕</button>
              </div>
              <div className="flex-1 p-2 bg-slate-50 space-y-1.5 overflow-y-auto text-[9px]">
                {chats.map((c, i) => (
                  <p key={i} className={`p-1.5 rounded-lg max-w-[85%] ${c.sender === 'bot' ? 'bg-white text-slate-800' : 'bg-indigo-600 text-white ml-auto'}`}>{c.text}</p>
                ))}
              </div>
              <div className="p-1.5 border-t bg-white flex gap-1">
                <button onClick={() => query('timing')} className="bg-indigo-50 text-[8px] font-bold p-1 rounded">वर्ग वेळापत्रक</button>
                <button onClick={() => query('fees')} className="bg-indigo-50 text-[8px] font-bold p-1 rounded">फीस संरचना</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setOpen(true)} className="bg-indigo-600 text-white font-bold w-12 h-12 rounded-full shadow-2xl text-lg flex items-center justify-center">💬</button>
          )}
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
